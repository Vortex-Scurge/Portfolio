<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Blog post template — cybersecurity writeup by Aravindan.">
  <title>Blog Post | Aravindan</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar" id="navbar">
    <div class="nav-inner">
      <a href="../index.html" class="nav-logo">&lt;<span>Aravindan</span>/&gt;</a>
      <div class="nav-links" id="nav-links">
        <a href="../index.html">Home</a>
        <a href="../projects.html">Projects</a>
        <a href="../blog.html" class="active">Blog</a>
        <a href="../experience.html">Experience</a>
        <a href="../resume.html">Resume</a>
        <a href="../contact.html">Contact</a>
      </div>
      <button class="nav-toggle" id="nav-toggle" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>
  <div class="nav-overlay" id="nav-overlay"></div>

  <!-- Blog Post -->
  <article class="blog-post">
    <div class="container">
      <a href="../blog.html" class="back-link">
        <i class="fas fa-arrow-left"></i> Back to Blog
      </a>

      <header class="blog-post-header fade-in">
        <span class="blog-card-tag">Coming Soon</span>
        <h1>Blog Post Title</h1>
        <div class="blog-post-meta">
          <span><i class="fas fa-calendar"></i> Date</span>
          <span><i class="fas fa-clock"></i> X min read</span>
          <span><i class="fas fa-tag"></i> Category</span>
        </div>
      </header>

      <div class="blog-post-content fade-in">
        <div style="text-align: center; padding: 60px 20px; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-md);">
          <i class="fas fa-pen-to-square" style="font-size: 3rem; color: var(--text-muted); margin-bottom: 20px; display: block;"></i>
          <h2 style="color: var(--text-secondary); margin-bottom: 12px;">Coming Soon</h2>
          <p style="color: var(--text-muted); max-width: 400px; margin: 0 auto;">
            This blog post is currently being written. Check back soon for the full content!
          </p>
        </div>
      </div>
    </div>
  </article>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-inner">
        <div class="footer-copy">&copy; 2025 <span>Aravindan</span>. Built with passion and caffeine.</div>
        <div class="footer-links">
          <a href="https://github.com/Vortex-Scurge" target="_blank" aria-label="GitHub"><i class="fab fa-github"></i></a>
          <a href="https://www.linkedin.com/in/aravindan-ravichandran-2b2144337/" target="_blank" aria-label="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
          <a href="mailto:aravinanravichandiran@gmail.com" aria-label="Email"><i class="fas fa-envelope"></i></a>
        </div>
      </div>
    </div>
  </footer>

  <script src="../js/main.js"></script>
</body>
</html>
